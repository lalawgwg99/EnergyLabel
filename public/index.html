<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能源分級圖檔控制台</title>
<style>
:root {
    --bg: #f2efe8;
    --panel: rgba(255, 252, 247, 0.86);
    --panel-strong: #fffaf2;
    --text: #1c2329;
    --muted: #6e7681;
    --line: rgba(28, 35, 41, 0.08);
    --brand: #0f6fff;
    --brand-dark: #0a4bbb;
    --accent: #12b886;
    --warn: #ff9f1c;
    --danger: #ef4444;
    --shadow: 0 28px 80px rgba(24, 42, 62, 0.14);
    --radius-xl: 32px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --font: "Avenir Next", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    font-family: var(--font);
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(15, 111, 255, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(18, 184, 134, 0.18), transparent 30%),
        linear-gradient(135deg, #f6f2eb 0%, #eef4f9 55%, #f4efe6 100%);
    padding: 28px;
}
.shell {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    gap: 24px;
}
.hero-card,
.panel {
    background: var(--panel);
    border: 1px solid rgba(255, 255, 255, 0.72);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
}
.hero-card {
    border-radius: var(--radius-xl);
    padding: 32px;
    position: relative;
    overflow: hidden;
}
.hero-card::after {
    content: "";
    position: absolute;
    inset: auto -60px -80px auto;
    width: 240px;
    height: 240px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(15, 111, 255, 0.24), transparent 70%);
}
.hero-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
}
.brand-mark {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, var(--brand) 0%, #36b5ff 100%);
    color: white;
    box-shadow: 0 12px 28px rgba(15, 111, 255, 0.34);
}
.brand-mark svg { width: 26px; height: 26px; fill: currentColor; }
.eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand-dark);
    font-weight: 700;
    margin-bottom: 6px;
}
.hero-title {
    font-size: clamp(30px, 4vw, 48px);
    line-height: 1.02;
    letter-spacing: -0.05em;
    font-weight: 750;
    margin-bottom: 14px;
}
.hero-copy {
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
    max-width: 52ch;
    margin-bottom: 0;
}
.metric-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 10px;
}
.metric-value {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 6px;
}
.metric-value.ok { color: var(--accent); }
.metric-value.err { color: var(--danger); }
.metric-value.warn { color: var(--warn); }
.metric-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
}
.panel {
    border-radius: var(--radius-xl);
    padding: 24px;
}
.section-title {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 14px;
}
.section-title h2 {
    font-size: 21px;
    letter-spacing: -0.03em;
}
.section-title p {
    font-size: 13px;
    color: var(--muted);
}
.toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.ghost-btn {
    border: 1px solid rgba(28, 35, 41, 0.1);
    background: rgba(255, 255, 255, 0.7);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}
.ghost-btn:hover {
    transform: translateY(-1px);
    border-color: rgba(15, 111, 255, 0.28);
    background: white;
}
.ghost-btn:disabled {
    cursor: not-allowed;
    opacity: 0.45;
    transform: none;
}
.input-shell {
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(15, 111, 255, 0.1);
    padding: 16px;
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}
.input-shell.dragover {
    background: rgba(240, 248, 255, 0.92);
    border-color: rgba(15, 111, 255, 0.45);
    transform: translateY(-1px);
}
textarea {
    width: 100%;
    min-height: 290px;
    border: none;
    background: transparent;
    resize: vertical;
    outline: none;
    font: inherit;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
}
textarea::placeholder { color: #98a2ad; }
.input-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    gap: 12px;
}
.mini-note {
    font-size: 12px;
    color: var(--muted);
}
.warn-pill {
    display: none;
    font-size: 12px;
    color: #8a5300;
    background: rgba(255, 159, 28, 0.14);
    border: 1px solid rgba(255, 159, 28, 0.22);
    border-radius: 999px;
    padding: 8px 10px;
    font-weight: 700;
}
.action-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
}
.primary-btn {
    border: none;
    border-radius: 999px;
    padding: 14px 24px;
    font: inherit;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: white;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--brand) 0%, #36b5ff 100%);
    box-shadow: 0 14px 30px rgba(15, 111, 255, 0.26);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.primary-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 34px rgba(15, 111, 255, 0.3);
}
.primary-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
.secondary-btn {
    border: 1px solid rgba(28, 35, 41, 0.1);
    border-radius: 999px;
    padding: 14px 20px;
    background: rgba(255, 255, 255, 0.8);
    color: var(--text);
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}
.progress-card,
.results-card {
    border-radius: var(--radius-xl);
}
.progress-card { padding: 22px; }
.progress-top {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: center;
    margin-bottom: 14px;
}
.progress-title {
    font-size: 18px;
    font-weight: 750;
}
.progress-subtitle {
    font-size: 13px;
    color: var(--muted);
}
.progress-track {
    height: 10px;
    border-radius: 999px;
    background: rgba(28, 35, 41, 0.08);
    overflow: hidden;
}
.progress-fill {
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--brand) 0%, #34d5ff 100%);
    transition: width 0.28s ease;
}
.notice-board {
    display: none;
    margin-top: 16px;
    gap: 10px;
}
.notice-item {
    border-radius: 16px;
    padding: 12px 14px;
    background: rgba(15, 111, 255, 0.08);
    color: var(--brand-dark);
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid rgba(15, 111, 255, 0.12);
}
.notice-item.notice-batch_cooldown {
    background: rgba(255, 159, 28, 0.12);
    color: #9f5d00;
    border-color: rgba(255, 159, 28, 0.24);
}
.notice-item.notice-batch_retry {
    background: rgba(18, 184, 134, 0.12);
    color: #0d8a64;
    border-color: rgba(18, 184, 134, 0.22);
}
.notice-item.notice-general {
    background: rgba(15, 111, 255, 0.08);
}
.results-card { padding: 24px; }
.results-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
}
.results-head h2 {
    font-size: 22px;
    letter-spacing: -0.03em;
}
.results-head p {
    font-size: 13px;
    color: var(--muted);
}
.result-list {
    list-style: none;
    display: grid;
    gap: 12px;
}
.result-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
}
.result-item::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 5px;
    background: rgba(28, 35, 41, 0.08);
}
.result-item.result-success::before {
    background: linear-gradient(180deg, #12b886 0%, #69dbb0 100%);
}
.result-item.result-error::before {
    background: linear-gradient(180deg, #ef4444 0%, #f97316 100%);
}
.result-item.cache-hit {
    background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248, 253, 251, 0.95));
    box-shadow: inset 0 0 0 1px rgba(18, 184, 134, 0.12);
}
.result-item.batch-retried {
    background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(245, 250, 255, 0.96));
    box-shadow: inset 0 0 0 1px rgba(15, 111, 255, 0.12);
}
.result-main {
    min-width: 0;
}
.result-model {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.01em;
    margin-bottom: 8px;
    word-break: break-all;
}
.result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
}
.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 800;
}
.status-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: currentColor;
}
.status-ok { background: rgba(18, 184, 134, 0.12); color: #0d8a64; }
.status-warn { background: rgba(255, 159, 28, 0.12); color: #9f5d00; }
.status-err { background: rgba(239, 68, 68, 0.12); color: #b42318; }
.tag {
    border-radius: 999px;
    padding: 6px 10px;
    background: rgba(28, 35, 41, 0.06);
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}
.result-message {
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
}
.result-signals {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}
.signal-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.03em;
}
.signal-chip::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: currentColor;
}
.signal-chip.signal-cache {
    background: rgba(18, 184, 134, 0.14);
    color: #0d8a64;
}
.signal-chip.signal-batch {
    background: rgba(15, 111, 255, 0.12);
    color: var(--brand-dark);
}
.signal-chip.signal-retry {
    background: rgba(255, 159, 28, 0.14);
    color: #9f5d00;
}
.signal-chip.signal-live {
    background: rgba(28, 35, 41, 0.08);
    color: #48515b;
}
.result-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}
.icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    border: 1px solid rgba(28, 35, 41, 0.08);
    background: white;
    color: var(--brand-dark);
    display: none;
    place-items: center;
    cursor: pointer;
}
.icon-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}
.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
}
.summary-box {
    border-radius: 18px;
    padding: 16px;
    background: rgba(255,255,255,0.82);
    border: 1px solid var(--line);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.summary-box.emphasis-cache {
    border-color: rgba(18, 184, 134, 0.24);
    box-shadow: inset 0 0 0 1px rgba(18, 184, 134, 0.12);
    transform: translateY(-1px);
}
.summary-box.emphasis-batch {
    border-color: rgba(15, 111, 255, 0.24);
    box-shadow: inset 0 0 0 1px rgba(15, 111, 255, 0.12);
    transform: translateY(-1px);
}
.summary-box .metric-value {
    font-size: 30px;
    margin-bottom: 4px;
}
.summary-box .metric-label {
    margin-bottom: 2px;
}
.summary-flag {
    display: none;
    margin-top: 8px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
}
.summary-box.emphasis-cache .summary-flag,
.summary-box.emphasis-batch .summary-flag {
    display: block;
}
.footer-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
}
.empty-state {
    padding: 28px;
    text-align: center;
    border-radius: 20px;
    border: 1px dashed rgba(28, 35, 41, 0.14);
    color: var(--muted);
    background: rgba(255,255,255,0.52);
}
.modal-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(18, 24, 31, 0.72);
    backdrop-filter: blur(6px);
    padding: 24px;
    z-index: 30;
}
.modal-overlay.show { display: flex; }
.modal-card {
    width: min(920px, 100%);
    max-height: calc(100vh - 48px);
    overflow: auto;
    border-radius: 28px;
    background: white;
    padding: 24px;
    position: relative;
}
.modal-card img {
    width: 100%;
    border-radius: 18px;
    background: #f3f4f6;
}
.modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 999px;
    background: rgba(28, 35, 41, 0.06);
    cursor: pointer;
}
.modal-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 14px;
    padding-right: 42px;
}
@media (max-width: 960px) {
    body { padding: 18px; }
    .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}
@media (max-width: 640px) {
    .hero-card,
    .panel { padding: 20px; }
    .summary-grid { grid-template-columns: 1fr; }
    .results-head,
    .progress-top,
    .section-title,
    .input-meta { flex-direction: column; align-items: flex-start; }
    .result-item { grid-template-columns: 1fr; }
    .result-actions { justify-content: flex-start; }
}
</style>
</head>
<body>
<main class="shell">
    <section class="hero">
        <article class="hero-card">
            <div class="hero-top">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24"><path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm3 4v2h8V8H8zm0 4v2h8v-2H8z"/></svg>
                </div>
                <div>
                    <div class="eyebrow">Energy Label Desk</div>
                    <h1 class="hero-title">能源分級圖檔控制台</h1>
                </div>
            </div>
            <p class="hero-copy">
                貼上型號後直接執行，這裡只保留查詢、進度與下載結果。
            </p>
        </article>
    </section>

    <section class="panel">
        <div class="section-title">
            <div>
                <h2>型號輸入</h2>
                <p>每行一個型號，也支援貼上逗號分隔內容與拖曳 `.txt` / `.csv`。</p>
            </div>
            <div class="toolbar">
                <button class="ghost-btn" id="historyBtn" onclick="loadHistory()">載入上次紀錄</button>
                <button class="ghost-btn" id="dedupBtn" onclick="removeDuplicates()" disabled>去除重複</button>
                <button class="ghost-btn" id="clearBtn" onclick="clearAll()" style="display:none;">清空</button>
            </div>
        </div>

        <div class="input-shell" id="dropZone">
            <textarea id="models" placeholder="例如：&#10;28cmtd&#10;RXV50ZVLT&#10;RXV60ZVLT"></textarea>
            <div class="input-meta">
                <span class="warn-pill" id="dupBadge">發現重複型號，建議先整理</span>
                <span class="mini-note" id="modelCount">0 個型號</span>
            </div>
        </div>

        <div class="action-bar">
            <button class="primary-btn" id="runBtn" onclick="startBatch()">開始抓取並整理</button>
            <button class="secondary-btn" id="zipBtn" onclick="downloadZipBundle()" style="display:none;">下載 ZIP</button>
            <button class="secondary-btn" id="retryBtn" onclick="retryTransient()" style="display:none;">只重跑失敗項目</button>
            <button class="secondary-btn" id="downloadAllBtn" onclick="downloadAllIndividually()" style="display:none;">逐張下載</button>
        </div>
    </section>

    <section class="panel progress-card">
        <div class="progress-top">
            <div>
                <div class="progress-title">批次進度</div>
                <div class="progress-subtitle" id="progressText">等待開始</div>
            </div>
            <div class="progress-subtitle" id="progressPercent">0%</div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="notice-board" id="noticeBoard"></div>
    </section>

    <section class="panel results-card">
        <div class="results-head">
            <div>
                <h2>執行結果</h2>
                <p>系統會即時更新每一筆型號的最終狀態，若觸發批次冷卻重跑也會覆蓋顯示。</p>
            </div>
            <div class="mini-note" id="summaryTime">尚未開始</div>
        </div>

        <ul class="result-list" id="resultList">
            <li class="empty-state" id="emptyState">輸入型號後開始抓取，這裡會顯示即時結果與下載操作。</li>
        </ul>

        <div class="summary-grid">
            <div class="summary-box">
                <div class="metric-label">成功</div>
                <div class="metric-value ok" id="statOk">0</div>
                <div class="metric-hint">可加入 ZIP</div>
            </div>
            <div class="summary-box">
                <div class="metric-label">失敗</div>
                <div class="metric-value err" id="statErr">0</div>
                <div class="metric-hint">需要人工確認</div>
            </div>
            <div class="summary-box">
                <div class="metric-label">快取命中</div>
                <div class="metric-value warn" id="statCache">0</div>
                <div class="metric-hint">免重打官網</div>
                <div class="summary-flag" id="cacheFlag">本輪已有快取加速</div>
            </div>
            <div class="summary-box" id="batchRetryBox">
                <div class="metric-label">批次重跑</div>
                <div class="metric-value" id="statBatchRetry">0</div>
                <div class="metric-hint">冷卻後補跑筆數</div>
                <div class="summary-flag" id="batchFlag">系統已啟動補跑</div>
            </div>
        </div>
    </section>
</main>

<div class="modal-overlay" id="imgModal" onclick="closeModal(event)">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal(event)">✕</button>
        <div class="modal-title" id="modalTitle">圖片預覽</div>
        <img id="modalImg" src="" alt="預覽圖">
    </div>
</div>

<script src="./config.js"></script>
<script>
const API_BASE = String(window.ENERGYLABEL_API_BASE || '').replace(/\/$/, '');
const API_PLACEHOLDER = 'https://your-render-service.onrender.com';
const CODE_META = {
    ok: { label: '成功', tone: 'ok' },
    not_found: { label: '型號不存在', tone: 'err' },
    upstream_unavailable: { label: '官網暫時故障', tone: 'warn' },
    access_denied: { label: '官網拒絕連線', tone: 'err' },
    image_parse_error: { label: '圖片解析失敗', tone: 'err' },
    unknown: { label: '未知錯誤', tone: 'err' }
};

let records = [];
let settled = [];
let successMap = {};
let notices = [];
let streamSummary = { cache_hits: 0, batch_retry_count: 0 };

function apiUrl(path) {
    return `${API_BASE}${path}`;
}

function hasConfiguredApiBase() {
    return Boolean(API_BASE) && API_BASE !== API_PLACEHOLDER;
}

function getModels() {
    return document.getElementById('models').value
        .split('\n')
        .map(item => item.trim())
        .filter(Boolean);
}

function updateInputStats() {
    const models = getModels();
    const unique = new Set(models);
    const hasDupes = models.length > unique.size;
    document.getElementById('modelCount').textContent = `${models.length} 個型號`;
    document.getElementById('dupBadge').style.display = hasDupes ? 'inline-flex' : 'none';
    document.getElementById('dedupBtn').disabled = !hasDupes;
    document.getElementById('clearBtn').style.display = models.length ? 'inline-flex' : 'none';
    if (models.length) {
        localStorage.setItem('energyLabelModels', models.join('\n'));
        document.getElementById('historyBtn').style.display = 'inline-flex';
    }
}

function init() {
    updateInputStats();
    if (!localStorage.getItem('energyLabelModels')) {
        document.getElementById('historyBtn').style.display = 'none';
    }
}

function removeDuplicates() {
    document.getElementById('models').value = [...new Set(getModels())].join('\n');
    updateInputStats();
}

function loadHistory() {
    const saved = localStorage.getItem('energyLabelModels');
    if (!saved) return;
    document.getElementById('models').value = saved;
    updateInputStats();
}

function clearAll() {
    document.getElementById('models').value = '';
    records = [];
    settled = [];
    successMap = {};
    notices = [];
    streamSummary = { cache_hits: 0, batch_retry_count: 0 };
    document.getElementById('resultList').innerHTML = '<li class="empty-state" id="emptyState">輸入型號後開始抓取，這裡會顯示即時結果與下載操作。</li>';
    document.getElementById('noticeBoard').style.display = 'none';
    document.getElementById('noticeBoard').innerHTML = '';
    document.getElementById('zipBtn').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('downloadAllBtn').style.display = 'none';
    document.getElementById('progressText').textContent = '等待開始';
    document.getElementById('progressPercent').textContent = '0%';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('summaryTime').textContent = '尚未開始';
    renderSummary();
    updateInputStats();
}

function appendNotice(message) {
    notices.unshift(message);
    notices = notices.slice(0, 4);
    const board = document.getElementById('noticeBoard');
    board.style.display = notices.length ? 'grid' : 'none';
    board.innerHTML = notices.map(item => `<div class="notice-item notice-${item.stage || 'general'}">${item.message}</div>`).join('');
}

function createResultItem(index, model) {
    const item = document.createElement('li');
    item.className = 'result-item';
    item.id = `result-${index}`;
    item.innerHTML = `
        <div class="result-main">
            <div class="result-model">${model}</div>
            <div class="result-meta">
                <span class="status-pill status-warn result-pill">等待查詢</span>
                <span class="tag result-tag">PENDING</span>
            </div>
            <div class="result-message">系統正在等待處理這一筆型號。</div>
            <div class="result-signals"></div>
        </div>
        <div class="result-actions">
            <button class="icon-btn result-preview" title="預覽圖片">
                <svg viewBox="0 0 24 24"><path d="M12 5c5.23 0 9.27 3.11 11 7-1.73 3.89-5.77 7-11 7S2.73 15.89 1 12c1.73-3.89 5.77-7 11-7zm0 2C8.54 7 5.52 8.96 4 12c1.52 3.04 4.54 5 8 5s6.48-1.96 8-5c-1.52-3.04-4.54-5-8-5zm0 2.2A2.8 2.8 0 1 1 9.2 12 2.8 2.8 0 0 1 12 9.2z"/></svg>
            </button>
            <button class="icon-btn result-download" title="下載單張圖片">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.17l3.59-3.58L17 11l-5 5-5-5 1.41-1.41L11 13.17V3h1zM5 19h14v2H5z"/></svg>
            </button>
        </div>
    `;
    item.querySelector('.result-preview').onclick = () => openModal(model);
    item.querySelector('.result-download').onclick = () => downloadSingle(model);
    return item;
}

function ensureResultList(models) {
    const list = document.getElementById('resultList');
    list.innerHTML = '';
    models.forEach((model, index) => list.appendChild(createResultItem(index, model)));
}

function statusClassFor(code, status) {
    if (status === 'ok') return 'status-ok';
    const tone = (CODE_META[code] || CODE_META.unknown).tone;
    if (tone === 'warn') return 'status-warn';
    return 'status-err';
}

function describeTags(result) {
    const tags = [];
    if (result.cache_hit) tags.push('CACHE');
    if (result.retries) tags.push(`RETRY ${result.retries}`);
    if (result.batch_retry) tags.push('BATCH RETRY');
    if (result.source === 'live') tags.push('LIVE');
    if (!tags.length) tags.push(result.status === 'ok' ? 'READY' : 'FINAL');
    return tags;
}

function cloneResultForReport(model, result) {
    const copy = JSON.parse(JSON.stringify({ model, result }));
    if (copy.result) delete copy.result.base64;
    return copy;
}

function applyResultUpdate(index, model, result) {
    records[index] = { model, result };
    const item = document.getElementById(`result-${index}`);
    if (!item) return;

    const meta = CODE_META[result.code] || CODE_META.unknown;
    const pill = item.querySelector('.result-pill');
    const tagBox = item.querySelector('.result-tag');
    const message = item.querySelector('.result-message');
    const signals = item.querySelector('.result-signals');
    const previewBtn = item.querySelector('.result-preview');
    const downloadBtn = item.querySelector('.result-download');

    item.classList.toggle('result-success', result.status === 'ok');
    item.classList.toggle('result-error', result.status === 'error');
    item.classList.toggle('cache-hit', Boolean(result.cache_hit));
    item.classList.toggle('batch-retried', Boolean(result.batch_retry));

    pill.className = `status-pill ${statusClassFor(result.code, result.status)} result-pill`;
    pill.textContent = meta.label;
    tagBox.textContent = describeTags(result).join(' · ');
    message.textContent = result.status === 'ok'
        ? `圖片已取得，可直接預覽、單張下載或加入 ZIP。${result.cache_hit ? ' 這次使用快取結果。' : ''}`
        : result.message;
    signals.innerHTML = [
        result.cache_hit ? '<span class="signal-chip signal-cache">快取命中</span>' : '',
        result.batch_retry ? '<span class="signal-chip signal-batch">批次補跑</span>' : '',
        result.retries ? `<span class="signal-chip signal-retry">單筆重試 ${result.retries} 次</span>` : '',
        result.status === 'ok' && !result.cache_hit ? '<span class="signal-chip signal-live">即時抓取</span>' : ''
    ].filter(Boolean).join('');

    if (result.status === 'ok' && result.base64) {
        successMap[model] = { model, base64: result.base64 };
        previewBtn.style.display = 'grid';
        downloadBtn.style.display = 'grid';
    } else {
        delete successMap[model];
        previewBtn.style.display = 'none';
        downloadBtn.style.display = 'none';
    }

    renderSummary();
}

function renderSummary() {
    const validRecords = records.filter(Boolean);
    const okCount = validRecords.filter(item => item.result.status === 'ok').length;
    const errCount = validRecords.filter(item => item.result.status === 'error').length;
    const cacheCount = validRecords.filter(item => item.result.cache_hit).length;
    const completed = settled.filter(Boolean).length;
    const total = settled.length || validRecords.length || 0;
    const percent = total ? Math.round((completed / total) * 100) : 0;

    document.getElementById('statOk').textContent = okCount;
    document.getElementById('statErr').textContent = errCount;
    document.getElementById('statCache').textContent = streamSummary.cache_hits || cacheCount;
    document.getElementById('statBatchRetry').textContent = streamSummary.batch_retry_count || 0;

    document.getElementById('statCache').closest('.summary-box').classList.toggle('emphasis-cache', (streamSummary.cache_hits || cacheCount) > 0);
    document.getElementById('batchRetryBox').classList.toggle('emphasis-batch', (streamSummary.batch_retry_count || 0) > 0);

    document.getElementById('zipBtn').style.display = okCount > 0 ? 'inline-flex' : 'none';
    document.getElementById('downloadAllBtn').style.display = okCount > 0 ? 'inline-flex' : 'none';
    document.getElementById('retryBtn').style.display = errCount > 0 ? 'inline-flex' : 'none';
}

function updateProgress(completed, total) {
    const percent = total ? Math.round((completed / total) * 100) : 0;
    document.getElementById('progressFill').style.width = `${percent}%`;
    document.getElementById('progressPercent').textContent = `${percent}%`;
    document.getElementById('progressText').textContent = total
        ? `已完成 ${completed} / ${total} 筆型號`
        : '等待開始';
}

function openModal(model) {
    const item = successMap[model];
    if (!item) return;
    document.getElementById('modalTitle').textContent = model;
    document.getElementById('modalImg').src = `data:image/jpeg;base64,${item.base64}`;
    document.getElementById('imgModal').classList.add('show');
}

function closeModal(event) {
    if (event.target.id === 'imgModal' || event.target.classList.contains('modal-close')) {
        document.getElementById('imgModal').classList.remove('show');
    }
}

function base64ToBlob(base64, contentType = 'image/jpeg') {
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
        byteNumbers[i] = byteChars.charCodeAt(i);
    }
    return new Blob([new Uint8Array(byteNumbers)], { type: contentType });
}

function safeFilename(name) {
    return String(name || 'energy-label').replace(/[<>:"/\\|?*\s]+/g, '_');
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1200);
}

function downloadSingle(model) {
    const item = successMap[model];
    if (!item) return;
    downloadBlob(base64ToBlob(item.base64), `${safeFilename(model)}.jpg`);
}

async function downloadAllIndividually() {
    const items = Object.values(successMap);
    for (const item of items) {
        downloadSingle(item.model);
        await new Promise(resolve => setTimeout(resolve, 160));
    }
}

async function downloadZipBundle() {
    const items = Object.values(successMap);
    if (!items.length) {
        alert('目前沒有可打包的成功圖檔。');
        return;
    }
    const payload = {
        bundle_name: `energy-labels-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}`,
        items,
        results: records.filter(Boolean).map(entry => cloneResultForReport(entry.model, entry.result))
    };
    try {
        const resp = await fetch(apiUrl('/api/download-zip'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!resp.ok) throw new Error(await resp.text() || `HTTP ${resp.status}`);
        const blob = await resp.blob();
        const disposition = resp.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="([^"]+)"/);
        downloadBlob(blob, match ? match[1] : 'energy-labels.zip');
    } catch (error) {
        alert(`ZIP 下載失敗：${error.message}`);
    }
}

function retryTransient() {
    const retryModels = records
        .filter(Boolean)
        .filter(entry => entry.result.status === 'error')
        .map(entry => entry.model);
    if (!retryModels.length) return;
    document.getElementById('models').value = retryModels.join('\n');
    updateInputStats();
    startBatch();
}

async function startBatch() {
    const models = getModels();
    if (!models.length) {
        document.getElementById('models').focus();
        return;
    }
    if (!hasConfiguredApiBase()) {
        alert('尚未設定 Render API，請先修改 public/config.js');
        return;
    }

    const startTime = Date.now();
    records = new Array(models.length);
    settled = new Array(models.length).fill(false);
    successMap = {};
    notices = [];
    streamSummary = { cache_hits: 0, batch_retry_count: 0 };
    ensureResultList(models);
    document.getElementById('noticeBoard').innerHTML = '';
    document.getElementById('noticeBoard').style.display = 'none';
    document.getElementById('runBtn').disabled = true;
    document.getElementById('zipBtn').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('downloadAllBtn').style.display = 'none';
    updateProgress(0, models.length);
    renderSummary();

    try {
        const response = await fetch(apiUrl('/api/download-stream'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ models })
        });
        if (!response.ok) {
            throw new Error(await response.text() || `HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split('\n\n');
            buffer = parts.pop();

            for (const part of parts) {
                const line = part.trim();
                if (!line.startsWith('data: ')) continue;
                const payload = line.slice(6);
                if (payload === '[DONE]') continue;

                const data = JSON.parse(payload);
                if (data.type === 'notice') {
                    appendNotice({ stage: data.stage, message: data.message });
                    continue;
                }
                if (data.type === 'summary') {
                    streamSummary = data;
                    renderSummary();
                    continue;
                }
                if (data.type === 'result') {
                    if (!settled[data.index]) {
                        settled[data.index] = true;
                    }
                    applyResultUpdate(data.index, data.model, data.result);
                    updateProgress(settled.filter(Boolean).length, models.length);
                }
            }
        }
    } catch (error) {
        appendNotice(`批次流程中斷：${error.message}`);
        alert(`連線錯誤：${error.message}`);
    } finally {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('summaryTime').textContent = `總耗時 ${((Date.now() - startTime) / 1000).toFixed(1)} 秒`;
        updateProgress(settled.filter(Boolean).length, models.length);
        renderSummary();
    }
}

const dropZone = document.getElementById('dropZone');
const textarea = document.getElementById('models');
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, event => {
        event.preventDefault();
        event.stopPropagation();
    });
});
['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'));
});
['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'));
});
dropZone.addEventListener('drop', event => {
    const file = event.dataTransfer.files[0];
    if (!file || (!file.name.endsWith('.txt') && !file.name.endsWith('.csv'))) return;
    const reader = new FileReader();
    reader.onload = loadEvent => {
        let content = String(loadEvent.target.result || '');
        if (file.name.endsWith('.csv')) content = content.replace(/,/g, '\n');
        const current = textarea.value.trim();
        textarea.value = current ? `${current}\n${content}` : content;
        textarea.value = getModels().join('\n');
        updateInputStats();
    };
    reader.readAsText(file);
});

textarea.addEventListener('input', updateInputStats);
textarea.addEventListener('paste', event => {
    const pasted = (event.clipboardData || window.clipboardData).getData('text');
    if (!/[,;\t]/.test(pasted)) return;
    event.preventDefault();
    const items = pasted.split(/[,;\t\n]+/).map(item => item.trim()).filter(Boolean);
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const before = textarea.value.slice(0, start);
    const after = textarea.value.slice(end);
    const insert = items.join('\n');
    textarea.value = before + insert + after;
    textarea.selectionStart = textarea.selectionEnd = start + insert.length;
    updateInputStats();
});

document.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
        document.getElementById('imgModal').classList.remove('show');
    }
});

window.addEventListener('DOMContentLoaded', init);
</script>
