services:
  - type: web
    name: energylabel-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ALLOWED_ORIGINS
        value: https://energylabel.pages.dev
      - key: MAX_ATTEMPTS
        value: 5
      - key: BACKOFF_BASE_MS
        value: 1200
      - key: CACHE_TTL_SECONDS
        value: 900
      - key: BATCH_COOLDOWN_SECONDS
        value: 30
      - key: BATCH_RETRY_MIN_ERRORS
        value: 2
      - key: BATCH_RETRY_RATIO
        value: 0.35
